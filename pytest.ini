[pytest]
# Pytest configuration for Universal API Template

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Test path
testpaths = test

# Output options
addopts = 
    -ra
    --strict-markers
    --strict-config
    --color=yes
    -vv

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions and components
    integration: Integration tests for API endpoints
    performance: Performance and load tests
    auth: Authentication and authorization tests
    health: Health check and status tests
    docs: Documentation and schema tests
    slow: Slow running tests (deselect with '-m "not slow"')

# Asyncio mode
asyncio_mode = auto

# Coverage options
[coverage:run]
source = app
omit = 
    */tests/*
    */test_*.py
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
