name: Test API Endpoints

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with pytest
        env:
          DEBUG: '1'  # Enable debug mode for testing
        run: |
          pytest test/test_api_endpoints.py -v --tb=short --cov=app --cov-report=term-missing --cov-report=html

      - name: Upload coverage reports
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 70
          MINIMUM_ORANGE: 50

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check code formatting with black
        continue-on-error: true
        run: black --check app/

      - name: Check import sorting with isort
        continue-on-error: true
        run: isort --check-only app/

      - name: Lint with flake8
        continue-on-error: true
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DEBUG=1
          DATABASE_URL=sqlite:///./test_data.db
          AUTH_DATABASE_URL=sqlite:///./test_auth.db
          API_URL=0.0.0.0
          API_PORT=8000
          CORS_ORIGINS=*
          LOG_LEVEL=DEBUG
          EOF

      - name: Run integration tests
        env:
          DEBUG: '1'
        run: |
          pytest test/test_api_endpoints.py::TestHealthCheck -v --tb=short
          pytest test/test_api_endpoints.py::TestDocumentation -v --tb=short
          pytest test/test_api_endpoints.py::TestErrorHandling -v --tb=short
          pytest test/test_api_endpoints.py::TestPerformance -v --tb=short

      - name: Cleanup test databases
        if: always()
        run: |
          rm -f test_data.db test_auth.db
